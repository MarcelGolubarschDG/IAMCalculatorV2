services:

  mongodb:
    image: mongo
    container_name: mongodb-container_backend
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=secret
      - MONGO_INITDB_DATABASE=IAMCalculator
    restart: always

  backend:
    image: iambackend:latest
    container_name: node-backend
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb-container_backend:27017/IAMCalculator?authSource=admin
    volumes:
      - ./IAMCalculatorV2_Backend/server.js:/app/server.js
    command: /bin/bash -c "npm install && node server.js"
    restart: always

    
  angular-app:
    image: iamcalculator:latest
    ports:
      - "4200:4200"  # Bindet Port 4200 des Containers an Port 4200 des Hosts
    volumes:
      - ./IAMCalculator:/usr/src/app  # Bindet den Code der Angular-App in den Container
      - /usr/src/app/node_modules  # Verhindert, dass node_modules überschrieben wird
    environment:
      - CHOKIDAR_USEPOLLING=true  # Ermöglicht das Überwachen von Dateiänderungen (z.B. für Angular-CLI)
    command: /bin/sh -c "npm install && ng serve --host 0.0.0.0"

volumes:
  mongo-data: