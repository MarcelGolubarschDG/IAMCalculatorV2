<div class="ov-container">
  <div class="ov-header">
    <h5 class="ov-title">Kalkulationen</h5>
  </div>

  <div class="ov-grid" *ngIf="calculations.length > 0; else emptyState">
    <div class="ov-card" *ngFor="let calc of calculations; trackBy: trackByCalcId" (click)="goToPage('/Edit/Calculation/' + calc._id)">
      <div class="ov-card-header">
        <div class="ov-calc-name">{{ calc.basicform.calculationName || '(Ohne Name)' }}</div>
        <button
          class="ov-delete-btn"
          type="button"
          (click)="deleteCalculation(calc, $event)"
          [attr.aria-label]="'Kalkulation ' + (calc.basicform.calculationName || 'ohne Name') + ' löschen'"
          title="Kalkulation löschen">
          <i class="fa-solid fa-trash"></i>
        </button>
      </div>
      <div class="ov-customer">{{ calc.customerform.customerName || '–' }}</div>
      <div class="ov-stats">
        <div class="ov-stat">
          <i class="fa-solid fa-users"></i>
          <span>{{ calc.customerform.customerEmployees }}</span>
          <small>Identitäten</small>
        </div>
        <div class="ov-stat">
          <i class="fa-solid fa-plug"></i>
          <span>{{ amountOfTargetsystems(calc) }}</span>
          <small>Zielsysteme</small>
        </div>
        <div class="ov-stat">
          <i class="fa-solid fa-server"></i>
          <span>{{ calc.servers.length }}</span>
          <small>Server</small>
        </div>
      </div>
    </div>
  </div>

  <ng-template #emptyState>
    <div class="ov-empty">
      <i class="fa-solid fa-folder-open"></i>
      <p>Noch keine Kalkulationen vorhanden.</p>
    </div>
  </ng-template>
</div>
