
<div class="row">
    <div class="col ownCol" *ngFor="let calc of calculations">
        <a (click)="goToPage('/Calculation/' + calc.id);">
            <div class="ITSs">
                <div class="ITSg">{{calc.basic.calculationName}}</div>
                <div class="ITSr1">
                    <div class="ITSn">Identitäten</div>
                    <div class="ITSv">{{ calc.customer.customerInternalEmployees + calc.customer.customerExternalEmployees }}</div>
                </div>
                <div class="ITSr1">
                    <div class="ITSn">Zielsysteme</div>
                    <div class="ITSv">{{ this.amountOfTargetsystems(calc.id) }}</div>
                </div>
                <div class="ITSr1">
                    <div class="ITSn">Server</div>
                    <div class="ITSv"> {{ this.amountOfServerByCalcID(calc.id) }}</div>
                </div>
            </div>
        </a>
        <div class="d-flex w-100 align-items-center justify-content-between">
            <button class="ownDownloadButtonMenu">
                Download
            </button>
        </div>
        <div class="d-flex w-100 align-items-center justify-content-between">
            <button class="ownDeleteButtonMenu" (click)="this.delete(calc)">
                Löschen
            </button>
        </div>
    </div>
</div>
